server:
  port: 8080

spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  name: "To-Do List Manager"
  version: "1.0.0"
  api:
    title: "To-Do List API"
    version: "2.0.0"
    description: "REST API для управления задачами, файлами, избранным и пользовательскими настройками"
    contact:
      name: "Alexander Gorlanov"
      email: "alexander@example.com"
      url: "https://example.com"
  description: "MVP приложение для управления задачами"
  attachments:
    upload-dir: uploads

logging:
  level:
    com.example.demo: INFO
    org.springframework.web: INFO
